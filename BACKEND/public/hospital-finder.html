<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Find My Location & Nearby Hospitals (30 km Radius)</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root{
      --bg:#071026;
      --panel:#0e1a2b;
      --muted:#9fbce6;
      --accent:#ff3b3b;
      --accent-2:#10b981;
      --card:#0b1724;
      --glass: rgba(255,255,255,0.03);
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family: Inter, system-ui, Arial, sans-serif; background: linear-gradient(180deg,#071026 0%, #071428 60%); color:#e6eef8;
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    }
    .container{max-width:1200px;margin:28px auto;padding:20px;}
    .header{display:flex;align-items:center;gap:20px;margin-bottom:18px}
    .logo{width:64px;height:64px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:30px;background:linear-gradient(135deg,var(--accent),#ff7b7b);box-shadow:0 8px 30px rgba(255,59,59,0.08)}
    h1{font-size:1.5rem;margin:0;color:var(--accent)}
    .subtitle{color:var(--muted);font-size:0.95rem}

    .controls{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}
    .btn{background:var(--accent);color:#fff;border:0;padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:600;box-shadow:0 6px 18px rgba(255,59,59,0.08)}
    .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.06)}
    .btn.secondary{background:linear-gradient(90deg,var(--accent-2),#2ee6a6)}

    .layout{display:grid;grid-template-columns:1fr 420px;gap:18px}
    .panel{background:var(--panel);padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,0.03)}
    #map{height:640px;border-radius:10px;border:1px solid rgba(255,255,255,0.04)}

    .info-grid{display:flex;flex-direction:column;gap:10px}
    .meta{background:var(--card);padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.02)}
    .meta .label{color:var(--muted);font-weight:700;font-size:12px}
    .meta .value{margin-top:6px;color:#cfe7ff}

    .hospitals{margin-top:12px}
    .hospital{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));padding:12px;border-radius:10px;border-left:4px solid var(--accent);margin-bottom:12px;transition:all .22s;cursor:pointer}
    .hospital:hover{transform:translateY(-4px);box-shadow:0 10px 30px rgba(2,6,23,0.6)}
    .hospital .title{font-weight:700;color:var(--accent);display:flex;justify-content:space-between;align-items:center}
    .hospital .meta-row{font-size:13px;color:#bcd7ff;margin-top:8px}
    .hospital .badges{margin-top:8px}
    .badge{display:inline-block;background:var(--glass);color:var(--muted);padding:4px 8px;border-radius:999px;font-size:12px;margin-right:6px}

    @media (max-width: 980px){.layout{grid-template-columns:1fr}.container{padding:12px}#map{height:420px}}
  </style>
</head>
  <body>
  <div class="container">
    <div class="header">
      <div class="logo">🏥</div>
      <div>
        <h1>Nearby Hospitals & Emergency Centres</h1>
        <div class="subtitle">Find hospitals near you quickly — allow location or search manually</div>
      </div>
    </div>

    <div class="controls">
      <button id="locBtn" class="btn">📍 Use My Location</button>
      <button id="demoBtn" class="btn ghost">🏢 Demo (Chennai)</button>
      <button id="manualBtn" class="btn ghost">📝 Enter Address Manually</button>
      <button id="searchAddressBtnMobile" class="btn secondary" style="margin-left:auto;">🔎 Quick Search</button>
    </div>

    <div id="manualInput" style="display: none; margin-bottom:12px;">
      <div class="panel" style="display:flex;flex-direction:column;gap:10px">
        <div style="display:flex;gap:8px;align-items:center">
          <input type="text" id="addressInput" placeholder="Enter address (city, locality)" style="flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit">
          <button id="searchAddressBtnInline" class="btn">🔍 Search</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="number" id="latInput" placeholder="Latitude" step="any" style="flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit">
          <input type="number" id="lonInput" placeholder="Longitude" step="any" style="flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit">
          <button id="searchCoordsBtnInline" class="btn">📍 Go</button>
        </div>
        <div style="text-align:right"><button id="closeManualBtn" class="btn ghost">❌ Close</button></div>
      </div>
    </div>

    <div class="layout">
      <div>
        <div id="map" class="panel"></div>
        <div style="margin-top:14px" class="meta">
          <div class="label">📌 Coordinates</div>
          <div class="value" id="coords">Click on map or use buttons above</div>
          <div class="label" style="margin-top:10px">🏠 Full Address</div>
          <div class="value" id="address">Address will appear here</div>
          <div class="label" style="margin-top:10px">📮 Pincode</div>
          <div class="value" id="pincode">Pincode will appear here</div>
        </div>
      </div>

      <aside>
        <div class="panel">
          <h3 style="margin:0 0 8px 0;color:var(--accent)">Nearby Hospitals</h3>
          <div id="hospitalList">No data yet — find your location first.</div>
        </div>
      </aside>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const GOOGLE_API_KEY = "REPLACE_WITH_YOUR_KEY";

    // If the page is opened using file:// the browser will block external API calls and tiles.
    // Show a clear overlay with instructions so users don't see a confusing "ERR_FILE_NOT_FOUND".
    if (location.protocol === 'file:') {
      const overlay = document.createElement('div');
      overlay.style.position = 'fixed';
      overlay.style.top = '0';
      overlay.style.left = '0';
      overlay.style.right = '0';
      overlay.style.bottom = '0';
      overlay.style.background = 'linear-gradient(180deg, rgba(7,16,38,0.95), rgba(7,12,20,0.95))';
      overlay.style.color = '#e6eef8';
      overlay.style.zIndex = '99999';
      overlay.style.display = 'flex';
      overlay.style.alignItems = 'center';
      overlay.style.justifyContent = 'center';
      overlay.style.padding = '24px';

      overlay.innerHTML = `
        <div style="max-width:920px;text-align:left">
          <h2 style="color:var(--accent);margin-top:0">This page requires being served over HTTP</h2>
          <p style="color:var(--muted);font-size:15px">You opened the file directly (file://). For maps and API fetches to work, open the page through a web server.</p>
          <p style="background:rgba(255,255,255,0.03);padding:12px;border-radius:8px"><strong>Quick options (PowerShell):</strong></p>
          <pre style="background:#071428;padding:12px;border-radius:8px;color:#dbeafe;overflow:auto">cd "c:\\Users\\Madhukumar\\OneDrive\\Desktop\\train model1 add features\\BACKEND"; npm start</pre>
          <p style="color:var(--muted);font-size:13px;margin-top:6px">or serve only the public folder:</p>
          <pre style="background:#071428;padding:12px;border-radius:8px;color:#dbeafe;overflow:auto">cd "c:\\Users\\Madhukumar\\OneDrive\\Desktop\\train model1 add features\\BACKEND\\public"; python -m http.server 8000</pre>
          <p style="color:var(--muted);font-size:13px;margin-top:6px">After starting a server, open:</p>
          <pre style="background:#071428;padding:12px;border-radius:8px;color:#dbeafe;overflow:auto">http://localhost:5000/hospital-finder.html  (if using npm start)</pre>
          <pre style="background:#071428;padding:12px;border-radius:8px;color:#dbeafe;overflow:auto">http://localhost:8000/hospital-finder.html  (if using python -m http.server)</pre>
          <div style="margin-top:12px;text-align:right"><button id="dismissLocalWarning" class="btn ghost">Dismiss</button></div>
        </div>
      `;

      document.documentElement.appendChild(overlay);
      document.getElementById('dismissLocalWarning').addEventListener('click', () => overlay.remove());
    }
    const map = L.map('map').setView([20.5937, 78.9629], 5);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    let marker = null;
    let hospitalMarkers = [];
    const coordsEl = document.getElementById("coords");
    const addressEl = document.getElementById("address");
    const pincodeEl = document.getElementById("pincode");
    const hospitalList = document.getElementById("hospitalList");

    async function reverseGeocode(lat, lon) {
      coordsEl.textContent = `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
      addressEl.textContent = "Fetching address...";
      pincodeEl.textContent = "Fetching...";
      hospitalList.textContent = "Loading hospitals...";

      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`);
        const data = await res.json();
        const address = data.display_name || "Unknown area";
        const postcode = data.address?.postcode || "Not available";
        addressEl.textContent = address;
        pincodeEl.textContent = postcode;
        getHospitals(lat, lon);
      } catch (err) {
        addressEl.textContent = "Error fetching address";
        console.error(err);
      }
    }

    // Full helper functions: Google Places enrichment, Overpass query handling,
    // contact formatting, and supporting utilities. Adapted from TRY3 example.

    // Enhanced Google Places API functions to fetch Google Maps contact information
    async function getGooglePlacesData(lat, lon, name) {
      try {
        console.log(`Fetching Google Maps data for: ${name}`);
        
        // Multiple search strategies to find the exact hospital
        const searchQueries = [
          `${name} hospital near ${lat},${lon}`,
          `${name} hospital`,
          `hospital ${name}`,
          name.replace(/hospital/i, '').trim() + ' hospital'
        ];
        
        for (let query of searchQueries) {
          try {
            // Search for place using Google Places Text Search
            const searchUrl = `https://maps.googleapis.com/maps/api/place/textsearch/json?query=${encodeURIComponent(query)}&location=${lat},${lon}&radius=2000&key=${GOOGLE_API_KEY}`;
            
            // Use an open proxy to bypass CORS for demo clients (replace with secure server-proxy in production)
            const searchResponse = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(searchUrl)}`);
            
            if (!searchResponse.ok) continue;
            
            const searchData = await searchResponse.json();
            
            if (searchData.results && searchData.results.length > 0) {
              // Find the closest match
              let bestMatch = searchData.results[0];
              let minDistance = getDistance(lat, lon, bestMatch.geometry.location.lat, bestMatch.geometry.location.lng);
              
              for (let result of searchData.results) {
                const distance = getDistance(lat, lon, result.geometry.location.lat, result.geometry.location.lng);
                if (distance < minDistance) {
                  minDistance = distance;
                  bestMatch = result;
                }
              }
              
              // Get detailed information including contact numbers
              const detailsUrl = `https://maps.googleapis.com/maps/api/place/details/json?place_id=${bestMatch.place_id}&fields=name,rating,formatted_phone_number,international_phone_number,website,opening_hours,reviews,photos,types,business_status,user_ratings_total,vicinity,formatted_address&key=${GOOGLE_API_KEY}`;
              const detailsResponse = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(detailsUrl)}`);
              
              if (detailsResponse.ok) {
                const detailsData = await detailsResponse.json();
                if (detailsData.result) {
                  console.log(`Found Google Maps data for ${name}:`, detailsData.result);
                  return detailsData.result;
                }
              }
            }
          } catch (searchError) {
            console.warn(`Search failed for query: ${query}`, searchError);
            continue;
          }
        }
        
        console.log(`No Google Maps data found for: ${name}`);
        return null;
        
      } catch (error) {
        console.error('Google Places API error:', error);
        return null;
      }
    }
    
    // Function to extract and format Google Maps contact information
    function formatGoogleMapsContact(googleData, osmPhone) {
      const contacts = {
        primary: 'Not available',
        display: 'Contact information not available in Google Maps',
        hasGoogleData: false
      };
      
      if (googleData) {
        const googlePhone = googleData.formatted_phone_number || googleData.international_phone_number;
        
        if (googlePhone) {
          contacts.primary = googlePhone;
          contacts.hasGoogleData = true;
          
          let displayParts = [];
          displayParts.push(`📞 <strong>Phone (Google Maps):</strong> <a href="tel:${googlePhone}" style="color: #4CAF50; font-weight: bold; text-decoration: none;">${googlePhone}</a>`);
          
          if (googleData.international_phone_number && googleData.international_phone_number !== googleData.formatted_phone_number) {
            displayParts.push(`🌍 <strong>International:</strong> ${googleData.international_phone_number}`);
          }
          
          if (googleData.website) {
            displayParts.push(`🌐 <strong>Website:</strong> <a href="${googleData.website}" target="_blank" style="color: #2196F3; text-decoration: underline;">${googleData.website}</a>`);
          }
          
          if (googleData.business_status) {
            const statusColor = googleData.business_status === 'OPERATIONAL' ? '#4CAF50' : '#ff6b6b';
            displayParts.push(`🏢 <strong>Status:</strong> <span style="color: ${statusColor}; font-weight: bold;">${googleData.business_status}</span>`);
          }
          
          contacts.display = displayParts.join('<br>');
        } else {
          contacts.display = '📞 <strong>Google Maps:</strong> Contact number not available<br>🔍 Try calling directory assistance or search online';
        }
      }
      
      // Fallback to OSM data if no Google data
      if (!contacts.hasGoogleData && osmPhone && osmPhone.primary !== 'Not available') {
        contacts.primary = osmPhone.primary;
        contacts.display = `📞 <strong>Phone:</strong> <a href="tel:${osmPhone.primary}" style="color: #4CAF50; font-weight: bold;">${osmPhone.primary}</a><br><small>Source: OpenStreetMap data</small>`;
      }
      
      return contacts;
    }

    async function getHospitals(lat, lon) {
      hospitalList.innerHTML = "🔍 Searching nearby hospitals...";
      
      // Clear previous hospital markers
      hospitalMarkers.forEach(marker => map.removeLayer(marker));
      hospitalMarkers = [];
      
      const radiusKm = 30;
      const overpassQuery = `
        [out:json][timeout:25];
        (
          node["amenity"="hospital"](around:${radiusKm * 1000},${lat},${lon});
          way["amenity"="hospital"](around:${radiusKm * 1000},${lat},${lon});
          relation["amenity"="hospital"](around:${radiusKm * 1000},${lat},${lon});
        );
        out center meta;
      `;

      try {
        const response = await fetch('https://overpass-api.de/api/interpreter', {
          method: 'POST',
          body: 'data=' + encodeURIComponent(overpassQuery),
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();

        if (!data.elements || data.elements.length === 0) {
          hospitalList.innerHTML = "❌ No hospitals found within 30 km radius.";
          return;
        }

        hospitalList.innerHTML = "";
        
        const hospitalsWithDistance = data.elements.map(hospital => {
          const hospitalLat = hospital.lat || hospital.center?.lat;
          const hospitalLon = hospital.lon || hospital.center?.lon;
          
          if (!hospitalLat || !hospitalLon) return null;
          
          const distance = getDistance(lat, lon, hospitalLat, hospitalLon);
          return { ...hospital, distance, hospitalLat, hospitalLon };
        }).filter(h => h !== null).sort((a, b) => a.distance - b.distance);

        const hospitalsToShow = hospitalsWithDistance.slice(0, 20);

        // Process hospitals with Google Places enhancement
        for (let index = 0; index < hospitalsToShow.length; index++) {
          const hospital = hospitalsToShow[index];
          const name = hospital.tags?.name || `Hospital ${index + 1}`;
          const address = buildAddress(hospital.tags);
          const phone = getContactInfo(hospital.tags);
          const website = hospital.tags?.website || hospital.tags?.contact?.website || hospital.tags?.url || "";
          const emergencyService = hospital.tags?.emergency || "Unknown";
          const doctorInfo = getDoctorInfo(hospital.tags);
          const hospitalType = getHospitalType(hospital.tags);
          const operatingHours = getOperatingHours(hospital.tags);
          const facilities = getFacilities(hospital.tags);
          
          // Get enhanced Google Places data
          const googleData = await getGooglePlacesData(hospital.hospitalLat, hospital.hospitalLon, name);
          
          // Enhanced contact information with Google Maps data
          const googleMapsContact = formatGoogleMapsContact(googleData, phone);
          const enhancedPhone = googleMapsContact.primary;
          const rating = googleData?.rating || null;
          const totalRatings = googleData?.user_ratings_total || null;
          const businessStatus = googleData?.business_status || "Unknown";
          const enhancedWebsite = googleData?.website || website;
          const enhancedHours = googleData?.opening_hours?.weekday_text?.join('<br>') || operatingHours;
          const reviews = googleData?.reviews || [];
          const hospitalTypes = googleData?.types || [];
          
          // Log contact information for debugging
          console.log(`Contact info for ${name}:`, {
            googlePhone: googleData?.formatted_phone_number,
            internationalPhone: googleData?.international_phone_number,
            osmPhone: phone.primary,
            finalPhone: enhancedPhone
          });
          
          const div = document.createElement("div");
          div.className = "hospital";
          div.setAttribute('data-lat', hospital.hospitalLat);
          div.setAttribute('data-lon', hospital.hospitalLon);
          div.setAttribute('data-name', name);
          div.setAttribute('data-phone', phone.primary);
          
          div.onclick = function() {
            showHospitalOnMap(hospital.hospitalLat, hospital.hospitalLon, name, address, phone.primary);
          };
          
          div.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
              <strong style="color: var(--accent); font-size: 18px;">${name}</strong>
              <div style="text-align: right;">
                <span style="color: #a6bcd6; font-size: 12px;">📏 ${hospital.distance.toFixed(1)} km away</span>
                ${rating ? `<div style="color: #FFD700; font-size: 14px; margin-top: 2px;">⭐ ${rating}/5 ${totalRatings ? `(${totalRatings} reviews)` : ''}</div>` : ''}
              </div>
            </div>
            
            <div style="background: rgba(255,59,59,0.06); padding: 12px; border-radius: 5px; margin: 8px 0;">
              <div style="margin-bottom: 8px;"><strong>🏥 Type:</strong> ${hospitalType}</div>
              ${businessStatus !== 'Unknown' ? `<div style="margin-bottom: 8px;"><strong>🏢 Status:</strong> <span style="color: ${businessStatus === 'OPERATIONAL' ? '#4CAF50' : '#ff6b6b'}">${businessStatus}</span></div>` : ''}
              <div style="margin-bottom: 8px;"><strong>📍 Address:</strong> ${address}</div>
              ${googleData ? `<div style="margin-bottom: 8px; padding: 4px; background: rgba(76,175,80,0.06); border-radius: 3px;"><strong>✅ Google Maps:</strong> <span style="color: #4CAF50; font-size: 12px;">Verified hospital data available</span></div>` : `<div style="margin-bottom: 8px; padding: 4px; background: rgba(255,193,7,0.06); border-radius: 3px;"><strong>⚠️ Google Maps:</strong> <span style="color: #FF9800; font-size: 12px;">Limited data available</span></div>`}
              
              <div style="background: rgba(76, 175, 80, 0.06); padding: 10px; border-radius: 4px; margin: 6px 0; border-left: 4px solid #4CAF50;">
                <strong style="color: #4CAF50;">📞 Contact Information from Google Maps:</strong><br>
                <div style="margin-top: 6px; font-size: 14px; line-height: 1.6;">
                  ${googleMapsContact.display}
                </div>
                ${!googleMapsContact.hasGoogleData ? `<div style="margin-top: 8px; padding: 6px; background: rgba(255,193,7,0.12); border-radius: 3px; font-size: 12px;">⚠️ <strong>Note:</strong> This hospital may not have updated contact information in Google Maps. Please call directory assistance or search online for current phone numbers.</div>` : ''}
              </div>
              
              <div style="margin-bottom: 8px;"><strong>🚑 Emergency:</strong> ${emergencyService === "yes" ? "✅ Available 24/7" : emergencyService === "no" ? "❌ Not available" : "❓ Unknown"}</div>
              ${enhancedHours ? `<div style="margin-bottom: 8px;"><strong>⏰ Operating Hours:</strong><br><div style="font-size: 12px; margin-left: 10px; line-height: 1.3;">${enhancedHours}</div></div>` : ""}
            </div>
            
            <div style="background: rgba(0,255,0,0.04); padding: 10px; border-radius: 5px; margin: 8px 0;">
              <strong>👨‍⚕️ Medical Information & Doctor Services:</strong>
              ${doctorInfo.length > 0 ? doctorInfo.map(info => `<div style="margin: 3px 0; padding-left: 10px;">• ${info}</div>`).join('') : ''}
              <div style="margin: 8px 0; padding: 8px; background: rgba(255,255,255,0.02); border-radius: 4px;">
                <strong style="color: #4CAF50;">� For Doctor Appointments & Consultations:</strong><br>
                <div style="font-size: 13px; margin-top: 4px;">
                  • Call ${enhancedPhone !== 'Not available' ? enhancedPhone : 'hospital directly'} for doctor schedules<br>
                  • Book appointments with specialists<br>
                  • Emergency medical consultation available<br>
                  ${rating ? `• Highly rated facility (${rating}⭐) with ${totalRatings} patient reviews` : ''}
                </div>
              </div>
            </div>
            
            ${reviews.length > 0 ? `
            <div style="background: rgba(0,100,255,0.04); padding: 10px; border-radius: 5px; margin: 8px 0; max-height: 150px; overflow-y: auto;">
              <strong>� Recent Patient Reviews:</strong>
              ${reviews.slice(0, 3).map(review => `
                <div style="margin: 8px 0; padding: 6px; background: rgba(255,255,255,0.03); border-radius: 3px; border-left: 3px solid #FFD700;">
                  <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                    <strong style="font-size: 12px;">${review.author_name}</strong>
                    <span style="color: #FFD700; font-size: 12px;">${'⭐'.repeat(review.rating)}</span>
                  </div>
                  <div style="font-size: 11px; line-height: 1.3;">${review.text.substring(0, 100)}${review.text.length > 100 ? '...' : ''}</div>
                </div>
              `).join('')}
            </div>` : ''}
            
            ${facilities.length > 0 ? `
            <div style="background: rgba(0,0,255,0.03); padding: 10px; border-radius: 5px; margin: 8px 0;">
              <strong>🏥 Facilities & Services:</strong><br>
              ${facilities.map(facility => `<span style="background: var(--accent); color: white; padding: 2px 6px; border-radius: 3px; font-size: 11px; margin: 2px; display: inline-block;">${facility}</span>`).join(' ')}
            </div>` : ""}
            
            <div style="text-align: center; margin-top: 10px;">
              <button onclick="event.stopPropagation(); callHospital('${enhancedPhone}')" style="background: #28a745; color: white; border: none; padding: 8px 12px; border-radius: 4px; margin: 2px; cursor: pointer; font-weight: bold;">📞 Call Hospital</button>
              <button onclick="event.stopPropagation(); getDirections(${hospital.hospitalLat}, ${hospital.hospitalLon})" style="background: #007bff; color: white; border: none; padding: 8px 12px; border-radius: 4px; margin: 2px; cursor: pointer;">🗺️ Get Directions</button>
              ${enhancedWebsite ? `<button onclick="event.stopPropagation(); window.open('${enhancedWebsite}', '_blank')" style="background: #6f42c1; color: white; border: none; padding: 8px 12px; border-radius: 4px; margin: 2px; cursor: pointer;">🌐 Visit Website</button>` : ""}
              ${rating ? `<button onclick="event.stopPropagation(); showHospitalDetails('${name}', '${rating}', '${totalRatings}', '${enhancedPhone}')" style="background: #ff9500; color: white; border: none; padding: 8px 12px; border-radius: 4px; margin: 2px; cursor: pointer;">⭐ View ${rating}★ Rating</button>` : ""}
            </div>
          `;
          hospitalList.appendChild(div);
        }

        // Add hospital markers to map
        hospitalsToShow.forEach(hospital => {
          const hospitalMarker = L.circleMarker([hospital.hospitalLat, hospital.hospitalLon], {
            radius: 6,
            fillColor: "var(--accent)",
            color: "#fff",
            weight: 2,
            opacity: 1,
            fillOpacity: 0.9
          }).addTo(map);
          
          const name = hospital.tags?.name || "Hospital";
          hospitalMarker.bindPopup(`<b>${name}</b><br>${hospital.distance.toFixed(1)} km away`);
          hospitalMarkers.push(hospitalMarker);
        });

      } catch (err) {
        console.error('Error fetching hospitals:', err);
        hospitalList.innerHTML = `❌ Error loading hospitals: ${err.message}. Please try again.`;
      }
    }

    function showHospitalOnMap(lat, lon, name, address, phone) {
      map.setView([lat, lon], 16);
      
      const tempMarker = L.marker([lat, lon]).addTo(map);
      tempMarker.bindPopup(`<b>${name}</b><br>${address}<br>📞 ${phone}`).openPopup();
      
      setTimeout(() => {
        map.removeLayer(tempMarker);
      }, 15000);
    }

    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = 
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
        Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    function getContactInfo(tags) {
      const contacts = {
        phones: [],
        emergency: [],
        fax: [],
        emails: [],
        other: []
      };
      
      // Phone numbers
      if (tags?.phone) contacts.phones.push(tags.phone);
      if (tags?.['contact:phone']) contacts.phones.push(tags['contact:phone']);
      if (tags?.['phone:mobile']) contacts.phones.push(`Mobile: ${tags['phone:mobile']}`);
      
      // Emergency numbers
      if (tags?.['phone:emergency']) contacts.emergency.push(tags['phone:emergency']);
      if (tags?.['contact:emergency']) contacts.emergency.push(tags['contact:emergency']);
      if (tags?.emergency === 'yes' && tags?.phone) contacts.emergency.push(tags.phone);
      
      // Fax numbers
      if (tags?.fax) contacts.fax.push(tags.fax);
      if (tags?.['contact:fax']) contacts.fax.push(tags['contact:fax']);
      
      // Email addresses
      if (tags?.email) contacts.emails.push(tags.email);
      if (tags?.['contact:email']) contacts.emails.push(tags['contact:email']);
      if (tags?.['contact:website']) contacts.emails.push(`Website: ${tags['contact:website']}`);
      
      // Build display string with formatted sections
      const displayParts = [];
      
      if (contacts.phones.length > 0) {
        displayParts.push(`📞 Phone: ${contacts.phones.join(', ')}`);
      }
      
      if (contacts.emergency.length > 0) {
        displayParts.push(`🚨 Emergency: ${contacts.emergency.join(', ')}`);
      }
      
      if (contacts.fax.length > 0) {
        displayParts.push(`📠 Fax: ${contacts.fax.join(', ')}`);
      }
      
      if (contacts.emails.length > 0) {
        displayParts.push(`📧 Email: ${contacts.emails.join(', ')}`);
      }
      
      const primary = tags?.phone || tags?.['contact:phone'] || contacts.emergency[0] || "Not available";
      const display = displayParts.length > 0 ? displayParts.join('<br>') : "📞 Contact hospital directly - phone number not available in database";
      
      return { primary, display, all: contacts, formatted: displayParts };
    }
    
    function getDoctorInfo(tags) {
      const medicalInfo = {
        chiefDoctor: null,
        specialists: [],
        departments: [],
        services: []
      };
      
      // Chief doctor information
      if (tags?.['chief_doctor'] || tags?.['medical:chief'] || tags?.['doctor:head']) {
        medicalInfo.chiefDoctor = tags['chief_doctor'] || tags['medical:chief'] || tags['doctor:head'];
      }
      
      // Medical specialties
      if (tags?.['healthcare:speciality']) {
        const specialties = tags['healthcare:speciality'].split(';');
        specialties.forEach(specialty => {
          medicalInfo.specialists.push(`Dr. ${specialty.trim()} Specialist`);
        });
      }
      
      // Departments and services
      if (tags?.['medical:speciality']) medicalInfo.departments.push(`${tags['medical:speciality']} Department`);
      if (tags?.['emergency:speciality']) medicalInfo.departments.push(`Emergency ${tags['emergency:speciality']}`);
      if (tags?.department) medicalInfo.departments.push(`${tags.department} Department`);
      if (tags?.['medical:department']) medicalInfo.departments.push(`${tags['medical:department']} Department`);
      if (tags?.['medical:service']) medicalInfo.services.push(tags['medical:service']);
      
      // Build comprehensive doctor information
      const doctorList = [];
      
      // Add chief doctor only if available in data
      if (medicalInfo.chiefDoctor) {
        doctorList.push(`👨‍⚕️ Chief Doctor: Dr. ${medicalInfo.chiefDoctor}`);
      }
      
      // Add specialists only if available in data
      if (medicalInfo.specialists.length > 0) {
        medicalInfo.specialists.forEach(specialist => {
          doctorList.push(`🩺 ${specialist}`);
        });
      }
      
      // Add departments
      if (medicalInfo.departments.length > 0) {
        medicalInfo.departments.forEach(dept => {
          doctorList.push(`🏥 ${dept}`);
        });
      }
      
      // Add services
      if (medicalInfo.services.length > 0) {
        medicalInfo.services.forEach(service => {
          doctorList.push(`⚕️ ${service}`);
        });
      }
      
      // Only show generic departments if no specific doctor information is available
      if (doctorList.length === 0 && tags?.amenity === 'hospital') {
        doctorList.push("📞 Contact hospital directly for doctor information and appointments");
      }
      
      return doctorList;
    }
    
    function getHospitalType(tags) {
      if (tags?.['healthcare']) return `Healthcare: ${tags['healthcare']}`;
      if (tags?.['hospital:type']) return `${tags['hospital:type']} Hospital`;
      if (tags?.['medical:type']) return `${tags['medical:type']}`;
      if (tags?.emergency === 'yes') return "Emergency Hospital";
      if (tags?.['hospital:emergency']) return "Emergency Hospital";
      return "General Hospital";
    }
    
    function getOperatingHours(tags) {
      if (tags?.['opening_hours']) return tags['opening_hours'];
      if (tags?.['service_times']) return tags['service_times'];
      if (tags?.emergency === 'yes') return "24/7 Emergency";
      return null;
    }
    
    function getFacilities(tags) {
      const facilities = [];
      
      if (tags?.wheelchair === 'yes') facilities.push('♿ Wheelchair Access');
      if (tags?.parking === 'yes') facilities.push('🅿️ Parking');
      if (tags?.['parking:disabled'] === 'yes') facilities.push('♿🅿️ Disabled Parking');
      if (tags?.emergency === 'yes') facilities.push('🚑 Emergency');
      if (tags?.['emergency:covid19']) facilities.push('🦠 COVID-19');
      if (tags?.pharmacy === 'yes') facilities.push('💊 Pharmacy');
      if (tags?.laboratory === 'yes') facilities.push('🔬 Laboratory');
      if (tags?.radiology === 'yes') facilities.push('📡 Radiology');
      if (tags?.surgery === 'yes') facilities.push('🔪 Surgery');
      if (tags?.maternity === 'yes') facilities.push('👶 Maternity');
      if (tags?.dialysis === 'yes') facilities.push('🩸 Dialysis');
      if (tags?.['intensive_care'] === 'yes') facilities.push('🏥 ICU');
      if (tags?.ambulance === 'yes') facilities.push('🚑 Ambulance');
      if (tags?.['blood_bank'] === 'yes') facilities.push('🩸 Blood Bank');
      if (tags?.mortuary === 'yes') facilities.push('⚰️ Mortuary');
      if (tags?.beds) facilities.push(`🛏️ ${tags.beds} Beds`);
      if (tags?.capacity) facilities.push(`👥 Capacity: ${tags.capacity}`);
      
      return facilities;
    }
    
    function buildAddress(tags) {
      if (!tags) return "Address not available";
      
      const parts = [];
      if (tags['addr:housenumber']) parts.push(tags['addr:housenumber']);
      if (tags['addr:street']) parts.push(tags['addr:street']);
      if (tags['addr:suburb'] || tags['addr:neighbourhood']) parts.push(tags['addr:suburb'] || tags['addr:neighbourhood']);
      if (tags['addr:city']) parts.push(tags['addr:city']);
      if (tags['addr:state']) parts.push(tags['addr:state']);
      if (tags['addr:postcode']) parts.push(tags['addr:postcode']);
      
      return parts.length > 0 ? parts.join(', ') : "Address not available";
    }
    
    function callHospital(phoneNumber) {
      if (phoneNumber && phoneNumber !== "Not available") {
        // Clean the phone number for calling
        const cleanPhone = phoneNumber.replace(/[^+\d]/g, '');
        window.location.href = `tel:${cleanPhone}`;
      } else {
        alert("📞 Phone number not available in Google Maps for this hospital.\n\n💡 Try:\n• Search online for hospital contact\n• Call directory assistance\n• Visit hospital website");
      }
    }
    
    function showHospitalDetails(name, rating, totalRatings, phone) {
      const message = `Hospital: ${name}\n\nRating: ${rating}⭐ out of 5\nTotal Reviews: ${totalRatings}\nPhone: ${phone}\n\nThis hospital has been rated by real patients. Call for appointments and consultations.`;
      alert(message);
    }
    
    function getDirections(lat, lon) {
      const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;
      window.open(url, '_blank');
    }

    function setMarker(lat, lon) {
      if (marker) marker.setLatLng([lat, lon]);
      else {
        marker = L.marker([lat, lon], { draggable: true }).addTo(map);
        marker.on("dragend", (e) => {
          const pos = e.target.getLatLng();
          reverseGeocode(pos.lat, pos.lng);
        });
      }
      map.setView([lat, lon], 13);
    }

    function useMyLocation() {
      if (!navigator.geolocation) return alert("Geolocation not supported.");
      navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        setMarker(lat, lon);
        reverseGeocode(lat, lon);
      }, error => {
        alert("Could not get your location. Please try manual input.");
      });
    }

    function showManualInput() {
      document.getElementById("manualInput").style.display = "block";
    }

    function hideManualInput() {
      document.getElementById("manualInput").style.display = "none";
    }

    async function searchByAddress() {
      const address = document.getElementById("addressInput").value.trim();
      if (!address) {
        alert("Please enter an address");
        return;
      }

      try {
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`);
        const data = await response.json();
        
        if (data.length === 0) {
          alert("Address not found. Please try a different address.");
          return;
        }

        const lat = parseFloat(data[0].lat);
        const lon = parseFloat(data[0].lon);
        
        setMarker(lat, lon);
        reverseGeocode(lat, lon);
        hideManualInput();
        
      } catch (error) {
        console.error('Error searching address:', error);
        alert("Error searching for address. Please try again.");
      }
    }

    function searchByCoordinates() {
      const lat = parseFloat(document.getElementById("latInput").value);
      const lon = parseFloat(document.getElementById("lonInput").value);
      
      if (isNaN(lat) || isNaN(lon)) {
        alert("Please enter valid latitude and longitude values");
        return;
      }

      if (lat < -90 || lat > 90) {
        alert("Latitude must be between -90 and 90");
        return;
      }

      if (lon < -180 || lon > 180) {
        alert("Longitude must be between -180 and 180");
        return;
      }

      setMarker(lat, lon);
      reverseGeocode(lat, lon);
      hideManualInput();
    }

    // Event listeners (wire new inline IDs)
    document.getElementById("locBtn").addEventListener("click", useMyLocation);
    document.getElementById("demoBtn").addEventListener("click", () => {
      const lat = 13.0827, lon = 80.2707;
      setMarker(lat, lon);
      reverseGeocode(lat, lon);
    });

    document.getElementById("manualBtn").addEventListener("click", () => document.getElementById('manualInput').style.display = 'block');
    document.getElementById("closeManualBtn").addEventListener("click", hideManualInput);
    document.getElementById("searchAddressBtnInline").addEventListener("click", searchByAddress);
    document.getElementById("searchCoordsBtnInline").addEventListener("click", searchByCoordinates);
    document.getElementById("searchAddressBtnMobile").addEventListener("click", () => {
      // quick search: open manual input
      document.getElementById('manualInput').style.display = 'block';
      document.getElementById('addressInput').focus();
    });

    document.getElementById("addressInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        searchByAddress();
      }
    });

    document.getElementById("latInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        searchByCoordinates();
      }
    });
    
    document.getElementById("lonInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        searchByCoordinates();
      }
    });

    map.on("click", e => {
      const { lat, lng } = e.latlng;
      setMarker(lat, lng);
      reverseGeocode(lat, lng);
    });

    // Initialize with demo location
    console.log('Hospital Finder initialized successfully');
  </script>
</body>
