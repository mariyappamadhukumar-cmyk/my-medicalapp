<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - MediCare AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: radial-gradient(ellipse 120% 80% at 20% 0%, #FFE4E6, #FFCCD5, #FFB3C1);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(233,30,140,0.15);
      width: 100%;
      max-width: 400px;
      padding: 40px 36px;
      animation: pop .4s ease;
    }
    @keyframes pop {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 60px; height: 60px; border-radius: 50%;
      background: linear-gradient(135deg, #e91e8c, #f06292);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 28px; margin-bottom: 10px;
    }
    .logo h1 { font-size: 22px; color: #e91e8c; font-weight: 700; }
    .logo p  { font-size: 13px; color: #aaa; margin-top: 3px; }

    label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #eee;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border .2s;
      margin-bottom: 18px;
      color: #333;
    }
    input:focus { border-color: #e91e8c; }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #e91e8c, #f06292);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(233,30,140,0.35);
      transition: opacity .2s;
    }
    .btn:hover { opacity: .88; }

    .footer {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      color: #888;
    }
    .footer a { color: #e91e8c; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">??</div>
      <h1>MediCare AI</h1>
      <p>Sign in to continue</p>
    </div>

    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" />

    <label>Password</label>
    <input type="password" id="password" placeholder="Any password" />

    <button class="btn" onclick="login()">Sign In</button>

    <div class="footer">
      Don't have an account? <a href="register.html">Register</a>
    </div>
  </div>

  <script>
    function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) {
        alert('Please enter email and password.');
        return;
      }
      // Prototype: store name from email, redirect
      const name = email.split('@')[0];
      localStorage.setItem('userName', name);
      localStorage.setItem('userEmail', email);
      localStorage.setItem('authToken', 'prototype-token');
      window.location.href = 'welcome.html';
    }
    // Allow Enter key
    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
