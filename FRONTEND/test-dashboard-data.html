<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Data Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .info-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
        }

        .label {
            font-weight: bold;
            color: #667eea;
            margin-right: 10px;
        }

        .value {
            color: #333;
            font-family: 'Courier New', monospace;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .success {
            color: #28a745;
            font-weight: bold;
        }

        .error {
            color: #dc3545;
            font-weight: bold;
        }

        .json-output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            line-height: 1.6;
            max-height: 500px;
            overflow-y: auto;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            margin-left: 10px;
        }

        .badge-success {
            background: #d4edda;
            color: #155724;
        }

        .badge-error {
            background: #f8d7da;
            color: #721c24;
        }

        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Dashboard Data Debug Tool</h1>

        <div class="section">
            <h2>Authentication Status</h2>
            <div class="info-box">
                <span class="label">Token:</span>
                <span class="value" id="tokenStatus">Checking...</span>
            </div>
            <div class="info-box">
                <span class="label">User Info:</span>
                <span class="value" id="userStatus">Checking...</span>
            </div>
        </div>

        <div class="section">
            <h2>Actions</h2>
            <button onclick="testCoughAnalysesAPI()">🎤 Test Cough Analyses API</button>
            <button onclick="testChatAPI()">💬 Test Chat API</button>
            <button onclick="testUserAPI()">👤 Test User Info API</button>
            <button onclick="checkMongoDB()">🗄️ Check MongoDB Status</button>
        </div>

        <div class="section" id="resultsSection" style="display: none;">
            <h2>Test Results <span id="statusBadge"></span></h2>
            <div id="results"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://my-medicalapp.onrender.com';

        // Check authentication on load
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('authToken');
            const userInfo = localStorage.getItem('userInfo');

            if (token) {
                document.getElementById('tokenStatus').innerHTML = 
                    `<span class="success">✅ Found</span> (${token.substring(0, 20)}...)`;
            } else {
                document.getElementById('tokenStatus').innerHTML = 
                    `<span class="error">❌ Not found - Please login first!</span>`;
            }

            if (userInfo) {
                const user = JSON.parse(userInfo);
                document.getElementById('userStatus').innerHTML = 
                    `<span class="success">✅ ${user.name} (${user.email})</span>`;
            } else {
                document.getElementById('userStatus').innerHTML = 
                    `<span class="error">❌ Not found</span>`;
            }
        });

        async function testCoughAnalysesAPI() {
            const resultsSection = document.getElementById('resultsSection');
            const results = document.getElementById('results');
            const statusBadge = document.getElementById('statusBadge');
            
            resultsSection.style.display = 'block';
            results.innerHTML = '<p>Loading...</p>';

            try {
                const token = localStorage.getItem('authToken');
                
                if (!token) {
                    throw new Error('No authentication token found. Please login first!');
                }

                console.log('🔑 Using token:', token.substring(0, 20) + '...');
                console.log('📡 Calling API:', `${API_URL}/api/cough-analyses`);

                const response = await fetch(`${API_URL}/api/cough-analyses`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                console.log('📊 Response status:', response.status);
                console.log('📊 Response OK:', response.ok);

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                console.log('✅ Data received:', data);

                statusBadge.innerHTML = `<span class="status-badge badge-success">Success</span>`;
                
                results.innerHTML = `
                    <div class="info-box">
                        <span class="label">Status:</span>
                        <span class="value success">✅ SUCCESS</span>
                    </div>
                    <div class="info-box">
                        <span class="label">Total Records:</span>
                        <span class="value">${data.count || 0}</span>
                    </div>
                    <div class="info-box">
                        <span class="label">Data Length:</span>
                        <span class="value">${data.data ? data.data.length : 0}</span>
                    </div>
                    ${data.count === 0 ? `
                        <div class="info-box" style="background: #fff3cd; border-color: #856404;">
                            <span class="error">⚠️ No cough analyses found for your account!</span>
                            <p style="margin-top: 10px; color: #856404;">
                                This means either:<br>
                                1. You haven't done any cough analysis while logged in<br>
                                2. The analyses were saved without userId (done before login)<br>
                                3. MongoDB connection issue
                            </p>
                        </div>
                    ` : ''}
                    <h3 style="margin-top: 20px; color: #333;">Full Response:</h3>
                    <div class="json-output">${JSON.stringify(data, null, 2)}</div>
                `;
            } catch (error) {
                console.error('❌ Error:', error);
                statusBadge.innerHTML = `<span class="status-badge badge-error">Error</span>`;
                results.innerHTML = `
                    <div class="info-box" style="background: #f8d7da; border-color: #721c24;">
                        <span class="label error">❌ Error:</span>
                        <span class="value">${error.message}</span>
                    </div>
                    <div class="info-box">
                        <span class="label">Possible Causes:</span>
                        <ul style="margin-left: 30px; margin-top: 10px;">
                            <li>Backend server not running (check https://my-medicalapp.onrender.com/health)</li>
                            <li>No authentication token (please login)</li>
                            <li>MongoDB disconnected</li>
                            <li>Invalid or expired token</li>
                        </ul>
                    </div>
                `;
            }
        }

        async function testChatAPI() {
            const resultsSection = document.getElementById('resultsSection');
            const results = document.getElementById('results');
            const statusBadge = document.getElementById('statusBadge');
            
            resultsSection.style.display = 'block';
            results.innerHTML = '<p>Loading...</p>';

            try {
                const token = localStorage.getItem('authToken');
                
                if (!token) {
                    throw new Error('No authentication token found. Please login first!');
                }

                const response = await fetch(`${API_URL}/api/chat-conversations`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();

                statusBadge.innerHTML = `<span class="status-badge badge-success">Success</span>`;
                
                results.innerHTML = `
                    <div class="info-box">
                        <span class="label">Status:</span>
                        <span class="value success">✅ SUCCESS</span>
                    </div>
                    <div class="info-box">
                        <span class="label">Total Conversations:</span>
                        <span class="value">${data.length || 0}</span>
                    </div>
                    <h3 style="margin-top: 20px; color: #333;">Full Response:</h3>
                    <div class="json-output">${JSON.stringify(data, null, 2)}</div>
                `;
            } catch (error) {
                statusBadge.innerHTML = `<span class="status-badge badge-error">Error</span>`;
                results.innerHTML = `
                    <div class="info-box" style="background: #f8d7da; border-color: #721c24;">
                        <span class="label error">❌ Error:</span>
                        <span class="value">${error.message}</span>
                    </div>
                `;
            }
        }

        async function testUserAPI() {
            const resultsSection = document.getElementById('resultsSection');
            const results = document.getElementById('results');
            const statusBadge = document.getElementById('statusBadge');
            
            resultsSection.style.display = 'block';
            results.innerHTML = '<p>Loading...</p>';

            try {
                const token = localStorage.getItem('authToken');
                
                if (!token) {
                    throw new Error('No authentication token found. Please login first!');
                }

                const response = await fetch(`${API_URL}/api/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();

                statusBadge.innerHTML = `<span class="status-badge badge-success">Success</span>`;
                
                results.innerHTML = `
                    <div class="info-box">
                        <span class="label">Status:</span>
                        <span class="value success">✅ SUCCESS</span>
                    </div>
                    <div class="info-box">
                        <span class="label">User ID:</span>
                        <span class="value">${data.user.id || data.user._id}</span>
                    </div>
                    <div class="info-box">
                        <span class="label">Name:</span>
                        <span class="value">${data.user.name}</span>
                    </div>
                    <div class="info-box">
                        <span class="label">Email:</span>
                        <span class="value">${data.user.email}</span>
                    </div>
                    <h3 style="margin-top: 20px; color: #333;">Full Response:</h3>
                    <div class="json-output">${JSON.stringify(data, null, 2)}</div>
                `;
            } catch (error) {
                statusBadge.innerHTML = `<span class="status-badge badge-error">Error</span>`;
                results.innerHTML = `
                    <div class="info-box" style="background: #f8d7da; border-color: #721c24;">
                        <span class="label error">❌ Error:</span>
                        <span class="value">${error.message}</span>
                    </div>
                `;
            }
        }

        async function checkMongoDB() {
            const resultsSection = document.getElementById('resultsSection');
            const results = document.getElementById('results');
            const statusBadge = document.getElementById('statusBadge');
            
            resultsSection.style.display = 'block';
            results.innerHTML = '<p>Checking MongoDB status...</p>';

            try {
                const response = await fetch(`${API_URL}/health`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                const mongoStatus = data.mongodb?.status || 'unknown';
                const isConnected = mongoStatus === 'connected';

                statusBadge.innerHTML = isConnected 
                    ? `<span class="status-badge badge-success">Connected</span>`
                    : `<span class="status-badge badge-error">Disconnected</span>`;
                
                results.innerHTML = `
                    <div class="info-box">
                        <span class="label">MongoDB Status:</span>
                        <span class="value ${isConnected ? 'success' : 'error'}">
                            ${isConnected ? '✅ Connected' : '❌ Disconnected'}
                        </span>
                    </div>
                    <div class="info-box">
                        <span class="label">Database:</span>
                        <span class="value">${data.mongodb?.database || 'N/A'}</span>
                    </div>
                    <h3 style="margin-top: 20px; color: #333;">Full Response:</h3>
                    <div class="json-output">${JSON.stringify(data, null, 2)}</div>
                    ${!isConnected ? `
                        <div class="info-box" style="background: #f8d7da; border-color: #721c24; margin-top: 20px;">
                            <span class="error">⚠️ MongoDB is disconnected!</span>
                            <p style="margin-top: 10px;">
                                This is why your dashboard shows no data. The server can't retrieve data from the database.<br>
                                <strong>Solution:</strong> Restart the backend server to reconnect to MongoDB.
                            </p>
                        </div>
                    ` : ''}
                `;
            } catch (error) {
                statusBadge.innerHTML = `<span class="status-badge badge-error">Error</span>`;
                results.innerHTML = `
                    <div class="info-box" style="background: #f8d7da; border-color: #721c24;">
                        <span class="label error">❌ Error:</span>
                        <span class="value">${error.message}</span>
                    </div>
                    <div class="info-box">
                        <span class="label">Solution:</span>
                        <span class="value">Make sure backend server is running at https://my-medicalapp.onrender.com</span>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
