<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>👨‍⚕️ Find Nearby Doctors</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #4169E1;
      --primary-dark: #1E90FF;
      --secondary: #8B5CF6;
      --accent: #10b981;
      --bg-gradient-1: #FFE4E6;
      --bg-gradient-2: #FFCCD5;
      --card-bg: rgba(255, 255, 255, 0.9);
      --border: rgba(65, 105, 225, 0.3);
      --text-primary: #1f2937;
      --text-secondary: #4b5563;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
    }

    /* Back Button */
    .back-btn {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: 2px solid var(--border);
      padding: 10px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
    }

    .back-btn:hover {
      transform: translateX(-5px);
    }

    /* Header */
    .header {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 25px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .header h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    /* Location Section */
    .location-section {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .location-input-group {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .location-input {
      flex: 1;
      min-width: 250px;
      padding: 14px 20px;
      border: 2px solid var(--border);
      border-radius: 14px;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .location-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(65, 105, 225, 0.1);
    }

    .detect-btn, .search-btn {
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(65, 105, 225, 0.3);
    }

    .detect-btn:hover, .search-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(65, 105, 225, 0.4);
    }

    .detect-btn {
      background: linear-gradient(135deg, var(--accent), #059669);
    }

    /* Filters */
    .filters {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      padding: 20px 25px;
      margin-bottom: 25px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .filter-group {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-group label {
      font-weight: 600;
      color: var(--text-primary);
      margin-right: 10px;
    }

    select {
      padding: 10px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
      background: white;
    }

    select:focus {
      border-color: var(--primary);
    }

    /* Doctors Grid */
    .doctors-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .doctor-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .doctor-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
      border-color: var(--primary);
    }

    .doctor-header {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
    }

    .doctor-avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
      box-shadow: 0 4px 15px rgba(65, 105, 225, 0.3);
    }

    .doctor-info {
      flex: 1;
    }

    .doctor-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 5px;
    }

    .doctor-specialization {
      color: var(--primary);
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 5px;
    }

    .doctor-rating {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.9rem;
      color: #f59e0b;
    }

    .doctor-details {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 2px solid rgba(65, 105, 225, 0.1);
    }

    .detail-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .detail-item strong {
      color: var(--text-primary);
    }

    .contact-btn {
      width: 100%;
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 15px;
      transition: all 0.3s ease;
    }

    .contact-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(65, 105, 225, 0.4);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(65, 105, 225, 0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* No Results */
    .no-results {
      text-align: center;
      padding: 60px 20px;
      background: var(--card-bg);
      border-radius: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .no-results-icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }

    .no-results h3 {
      font-size: 1.5rem;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .no-results p {
      color: var(--text-secondary);
    }

    @media (max-width: 768px) {
      .location-input-group, .filter-group {
        flex-direction: column;
      }

      .location-input, .detect-btn, .search-btn {
        width: 100%;
      }

      .doctors-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="back-btn" onclick="goBack()">
      ← Back to Options
    </button>

    <header class="header">
      <h1>Find Nearby Doctors</h1>
      <p>Locate experienced doctors in your area for consultation</p>
    </header>

    <div class="location-section">
      <div class="location-input-group">
        <input 
          type="text" 
          id="locationInput" 
          class="location-input" 
          placeholder="Enter your city or area (e.g., Mumbai, Delhi)"
        />
        <button class="detect-btn" onclick="detectLocation()">📍 Detect Location</button>
        <button class="search-btn" onclick="searchDoctors()">🔍 Search Doctors</button>
      </div>
      <p id="currentLocation" style="margin-top: 15px; color: var(--text-secondary); font-size: 0.9rem;"></p>
    </div>

    <div class="filters">
      <div class="filter-group">
        <label>Specialization:</label>
        <select id="specializationFilter">
          <option value="all">All Specializations</option>
          <option value="general">General Physician</option>
          <option value="cardiologist">Cardiologist</option>
          <option value="dermatologist">Dermatologist</option>
          <option value="pediatrician">Pediatrician</option>
          <option value="orthopedic">Orthopedic</option>
          <option value="gynecologist">Gynecologist</option>
          <option value="dentist">Dentist</option>
          <option value="ent">ENT Specialist</option>
        </select>

        <label style="margin-left: 20px;">Sort By:</label>
        <select id="sortFilter">
          <option value="distance">Distance</option>
          <option value="rating">Rating</option>
          <option value="experience">Experience</option>
        </select>
      </div>
    </div>

    <div id="doctorsContainer">
      <div class="no-results">
        <div class="no-results-icon">📍</div>
        <h3>Enter Your Location</h3>
        <p>Please enter your location or detect it automatically to find nearby doctors</p>
      </div>
    </div>
  </div>

  <script>
    let currentLocationData = null;

    function goBack() {
      window.location.href = 'doctor-options.html';
    }

    // Detect user's location using Geolocation API
    async function detectLocation() {
      const currentLocElement = document.getElementById('currentLocation');
      
      if (!navigator.geolocation) {
        currentLocElement.textContent = '❌ Geolocation is not supported by your browser';
        currentLocElement.style.color = '#dc2626';
        return;
      }

      currentLocElement.textContent = '📍 Detecting your location...';
      currentLocElement.style.color = 'var(--primary)';

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const { latitude, longitude } = position.coords;
          
          try {
            // Get location name from coordinates (you can use a reverse geocoding API)
            const location = await reverseGeocode(latitude, longitude);
            document.getElementById('locationInput').value = location;
            currentLocationData = { latitude, longitude, name: location };
            currentLocElement.textContent = `✅ Current location: ${location}`;
            currentLocElement.style.color = 'var(--accent)';
            
            // Automatically search for doctors
            searchDoctors();
          } catch (error) {
            console.error('Error:', error);
            currentLocElement.textContent = '❌ Could not determine location name';
            currentLocElement.style.color = '#dc2626';
          }
        },
        (error) => {
          currentLocElement.textContent = `❌ ${error.message}`;
          currentLocElement.style.color = '#dc2626';
        }
      );
    }

    // Reverse geocoding (simplified - in production, use Google Maps or other API)
    async function reverseGeocode(lat, lon) {
      // This is a placeholder - integrate with actual geocoding service
      return "Your Current Area";
    }

    // Search for doctors
    async function searchDoctors() {
      const location = document.getElementById('locationInput').value.trim();
      
      if (!location) {
        alert('Please enter a location');
        return;
      }

      const specializationFilter = document.getElementById('specializationFilter').value;
      const sortFilter = document.getElementById('sortFilter').value;
      const container = document.getElementById('doctorsContainer');

      // Show loading
      container.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p>Searching for doctors near ${location}...</p>
        </div>
      `;

      try {
        const response = await fetch('http://localhost:5000/api/doctors/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            location: location,
            specialization: specializationFilter,
            sortBy: sortFilter,
            latitude: currentLocationData?.latitude,
            longitude: currentLocationData?.longitude
          })
        });

        const data = await response.json();

        if (data.ok && data.doctors && data.doctors.length > 0) {
          displayDoctors(data.doctors);
        } else {
          container.innerHTML = `
            <div class="no-results">
              <div class="no-results-icon">😔</div>
              <h3>No Doctors Found</h3>
              <p>We couldn't find any doctors in "${location}". Try a different location or specialization.</p>
            </div>
          `;
        }
      } catch (error) {
        console.error('Error:', error);
        container.innerHTML = `
          <div class="no-results">
            <div class="no-results-icon">❌</div>
            <h3>Connection Error</h3>
            <p>Unable to connect to the server. Please check if the server is running.</p>
          </div>
        `;
      }
    }

    // Display doctors list
    function displayDoctors(doctors) {
      const container = document.getElementById('doctorsContainer');
      const grid = document.createElement('div');
      grid.className = 'doctors-grid';

      doctors.forEach(doctor => {
        const card = document.createElement('div');
        card.className = 'doctor-card';
        card.innerHTML = `
          <div class="doctor-header">
            <div class="doctor-avatar">${doctor.avatar || '👨‍⚕️'}</div>
            <div class="doctor-info">
              <div class="doctor-name">${doctor.name}</div>
              <div class="doctor-specialization">${doctor.specialization}</div>
              <div class="doctor-rating">
                ${'⭐'.repeat(Math.floor(doctor.rating || 4))}
                <span>${doctor.rating || 4.0} (${doctor.reviews || 0} reviews)</span>
              </div>
            </div>
          </div>
          <div class="doctor-details">
            <div class="detail-item">
              <span>📍</span>
              <span><strong>Address:</strong> ${doctor.address}</span>
            </div>
            <div class="detail-item">
              <span>💼</span>
              <span><strong>Experience:</strong> ${doctor.experience} years</span>
            </div>
            <div class="detail-item">
              <span>📞</span>
              <span><strong>Phone:</strong> ${doctor.phone}</span>
            </div>
            <div class="detail-item">
              <span>💰</span>
              <span><strong>Consultation Fee:</strong> ₹${doctor.fee}</span>
            </div>
            <div class="detail-item">
              <span>🕐</span>
              <span><strong>Timing:</strong> ${doctor.timing}</span>
            </div>
          </div>
          <button class="contact-btn" onclick="contactDoctor('${doctor.id}', '${doctor.name}', '${doctor.phone}')">
            📞 Book Appointment
          </button>
        `;
        grid.appendChild(card);
      });

      container.innerHTML = '';
      container.appendChild(grid);
    }

    // Contact doctor
    function contactDoctor(doctorId, doctorName, phone) {
      const message = `Hello! I would like to book an appointment with Dr. ${doctorName}`;
      alert(`Booking appointment with ${doctorName}\n\nPhone: ${phone}\n\nYou can call directly or we can integrate a booking system here.`);
      
      // In production, integrate with actual booking system or WhatsApp
      // window.open(`https://wa.me/${phone.replace(/[^0-9]/g, '')}?text=${encodeURIComponent(message)}`, '_blank');
    }

    // Add filter change listeners
    document.getElementById('specializationFilter').addEventListener('change', () => {
      if (document.getElementById('locationInput').value) {
        searchDoctors();
      }
    });

    document.getElementById('sortFilter').addEventListener('change', () => {
      if (document.getElementById('locationInput').value) {
        searchDoctors();
      }
    });

    // Allow Enter key to search
    document.getElementById('locationInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        searchDoctors();
      }
    });
  </script>
</body>
</html>
